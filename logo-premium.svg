<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    HUSH High-End Premium Grayscale
    Colors:
    - Pure Black: #09090b
    - Deep Gray: #18181b
    - Mid Gray: #71717a
    - Silver/White: #fafafa
  -->

  <defs>
    <!-- Sophisticated Silver Gradient -->
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>

    <!-- Deep Glass Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>

    <!-- Premium Noise Filter (Finer texture) -->
    <filter id="premium-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&amp;display=swap');
      
      .mono-text { font-family: 'JetBrains Mono', monospace; }
      .sans-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>

  <!-- Background: Absolute Zero Deep Black -->
  <rect width="600" height="200" rx="24" fill="#09090b" />
  
  <!-- Subtle Grainy Texture Overlay -->
  <rect width="600" height="200" rx="24" fill="white" opacity="0.02" filter="url(#premium-noise)"/>

  <!-- ================= LOGO MARK ================= -->
  <g transform="translate(60, 50)">
    
    <!-- Ultra-Fine Brackets [ ] (Silver / 2px stroke) -->
    <path d="M 20 0 L 0 0 L 0 100 L 20 100" stroke="#3f3f46" stroke-width="2" stroke-linecap="square" fill="none" />
    <path d="M 80 0 L 100 0 L 100 100 L 80 100" stroke="#3f3f46" stroke-width="2" stroke-linecap="square" fill="none" />

    <!-- Glass Redaction Shield -->
    <path d="M 25 15 L 75 15 L 75 75 L 50 95 L 25 75 Z" fill="#18181b" stroke="#3f3f46" stroke-width="1" />
    
    <!-- Tone-on-tone Redaction Strips -->
    <rect x="35" y="35" width="30" height="4" rx="1" fill="#3f3f46" />
    <rect x="35" y="45" width="20" height="4" rx="1" fill="#27272a" />
    
    <!-- Precision Core Dot (Pure White) -->
    <circle cx="50" cy="65" r="2.5" fill="#fafafa" />

  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  
  <!-- Main "HUSH" Text: Light Weight, High Tracking -->
  <text x="190" y="110" class="mono-text" font-size="64" font-weight="300" fill="#fafafa" letter-spacing="0.1em">HUSH</text>
  
  <!-- "SEMANTIC SECURITY" Subtitle: Extra Spaced -->
  <text x="195" y="145" class="sans-text" font-size="12" font-weight="300" fill="#71717a" letter-spacing="0.4em">SEMANTIC SECURITY</text>

  <!-- "by [ai]ctrl" subtle mark -->
  <text x="540" y="170" class="mono-text" font-size="9" font-weight="700" text-anchor="end">
    <tspan fill="#3f3f46">[</tspan>
    <tspan fill="#71717a">ai</tspan>
    <tspan fill="#3f3f46">]</tspan>
    <tspan fill="#a1a1aa">ctrl</tspan>
  </text>

  <!-- Decorative technical hair-lines -->
  <line x1="190" y1="125" x2="540" y2="125" stroke="#18181b" stroke-width="1" />
  <rect x="535" y="123" width="5" height="4" fill="#3f3f46" opacity="0.5"/>

</svg>
