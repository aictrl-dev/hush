<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    HUSH High-End Premium Grayscale (Studio Edition)
    Optimized for White/Transparent backgrounds.
    Colors:
    - Primary Ink: #18181b
    - Tech Silver: #d4d4d8
    - Muted Text: #71717a
  -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&amp;display=swap');
      
      .mono-text { font-family: 'JetBrains Mono', monospace; }
      .sans-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>

  <!-- ================= LOGO MARK ================= -->
  <g transform="translate(60, 50)">
    
    <!-- Ultra-Fine Brackets [ ] (Tech Silver / 1.5px stroke) -->
    <path d="M 20 0 L 0 0 L 0 100 L 20 100" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="square" fill="none" />
    <path d="M 80 0 L 100 0 L 100 100 L 80 100" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="square" fill="none" />

    <!-- Technical Shield / Redaction Block -->
    <path d="M 25 15 L 75 15 L 75 75 L 50 95 L 25 75 Z" fill="#f4f4f5" stroke="#18181b" stroke-width="1" />
    
    <!-- Precision Redaction Strips (Ink on Glass) -->
    <rect x="35" y="35" width="30" height="3" rx="0.5" fill="#18181b" />
    <rect x="35" y="43" width="20" height="3" rx="0.5" fill="#d4d4d8" />
    
    <!-- Core Dot -->
    <circle cx="50" cy="65" r="2" fill="#18181b" />

  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  
  <!-- Main "HUSH" Text: Light Weight, High Tracking, Deep Ink -->
  <text x="190" y="110" class="mono-text" font-size="64" font-weight="300" fill="#18181b" letter-spacing="0.12em">HUSH</text>
  
  <!-- "SEMANTIC SECURITY" Subtitle: Extra Spaced, Muted -->
  <text x="195" y="145" class="sans-text" font-size="11" font-weight="500" fill="#71717a" letter-spacing="0.5em">SEMANTIC SECURITY</text>

  <!-- "by [ai]ctrl" technical stamp -->
  <text x="540" y="170" class="mono-text" font-size="9" font-weight="700" text-anchor="end">
    <tspan fill="#d4d4d8">[</tspan>
    <tspan fill="#18181b">ai</tspan>
    <tspan fill="#d4d4d8">]</tspan>
    <tspan fill="#71717a">ctrl</tspan>
  </text>

  <!-- Decorative technical hair-line -->
  <line x1="190" y1="125" x2="540" y2="125" stroke="#f4f4f5" stroke-width="1" />
  <rect x="535" y="123" width="5" height="4" fill="#18181b" opacity="0.1"/>

</svg>
