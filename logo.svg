<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c6ef5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');
      .mono-text { font-family: 'JetBrains Mono', monospace; }
      .sans-text { font-family: 'Inter', sans-serif; }
    </style>
  </defs>

  <rect width="600" height="200" rx="24" fill="#09090b" />

  <!-- ================= LOGO MARK ================= -->
  <g transform="translate(50, 40)">
    <path d="M 30 10 L 10 10 L 10 110 L 30 110" stroke="#71717a" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" fill="none" />
    <path d="M 90 10 L 110 10 L 110 110 L 90 110" stroke="#71717a" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" fill="none" />
    <path d="M 20 20 C 20 15, 100 15, 100 20 L 100 70 C 100 95, 60 115, 60 115 C 60 115, 20 95, 20 70 Z" fill="url(#brand-grad)" />
    <g transform="translate(60, 58) scale(1.1)">
      <path d="M 0 -18 L 0 18 M -15.5 -9 L 15.5 9 M -15.5 9 L 15.5 -9" stroke="#f59e0b" stroke-width="7" stroke-linecap="round" />
    </g>
  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  <text x="200" y="115" class="mono-text" font-size="82" font-weight="700" fill="#fafafa" letter-spacing="-0.03em">hush</text>
  <text x="205" y="150" class="sans-text" font-size="16" font-weight="500" fill="#a1a1aa" letter-spacing="0.1em">semantic security gateway</text>

  <!-- Brand Signature Signature: aictrl.dev -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#4c6ef5" opacity="0.1" stroke="#4c6ef5" stroke-opacity="0.2" stroke-width="1"/>
    <text x="65" y="20" class="mono-text" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle">
      <tspan fill="#4c6ef5">ai</tspan><tspan fill="#fafafa">ctrl</tspan><tspan fill="#71717a">.dev</tspan>
    </text>
  </g>
</svg>
